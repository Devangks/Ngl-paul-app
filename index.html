<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NGL | @Pjmask</title>
<link rel="icon" type="image/jpeg" href="Ngl.jpeg">
<meta name="theme-color" content="#ec006c">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    padding:25px 15px;
    background: linear-gradient(135deg, #ff0f7b 0%, #f89b29 100%);
    background-attachment: fixed;
}

.top{ width:100%; max-width:380px; }

.card{
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    border:1px solid rgba(255,255,255,0.25);
}

.card-top{
    background:#fff;
    padding:20px;
    display:flex;
    align-items:center;
    gap:14px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    background:#cbd5e1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.avatar svg{ width:28px; fill:white; }

.user-info .handle{ font-size:0.9rem; font-weight:700; color:#475569; }
.user-info .text{ font-size:1rem; font-weight:900; color:#0f172a; }

.card-bottom{
    position:relative;
    padding:20px;
    height:190px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}

textarea{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    resize:none;
    background:transparent;
    font-size:1.4rem;
    font-weight:800;
    color:#000;
}

textarea::placeholder{
    color:rgba(0,0,0,0.35);
    transition: opacity 0.4s ease-in-out; 
}

textarea.fade-text::placeholder { opacity: 0; }

.dice{
    position:absolute;
    bottom:15px;
    right:15px;
    width:38px;
    height:38px;
    border-radius:50%;
    background:rgba(255,255,255,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

.lock{
    margin-top:10px;
    text-align:center;
    font-size:0.9rem;
    font-weight:700;
    color:white;
}

.send{
    width:100%;
    margin-top:12px;
    padding:18px;
    border:none;
    border-radius:50px;
    background:black;
    color:white;
    font-weight:900;
    font-size:1.1rem;
    cursor:pointer;
}

.bottom{
    width:100%;
    max-width:380px;
    text-align:center;
}

.count{ color:white; font-weight:800; margin-bottom:15px; }

.get{
    width:100%;
    padding:18px;
    border:none;
    border-radius:50px;
    background:black;
    color:white;
    font-weight:900;
    cursor:pointer;
}

.links{
    margin-top:20px;
    color:rgba(255,255,255,0.8);
    font-size:0.8rem;
    letter-spacing:1px;
}
</style>
</head>

<body>

<form class="top" action="https://api.web3forms.com/submit" method="POST">
<input type="hidden" name="access_key" value="5b5a61db-98bc-415a-a94c-84b120a952d1">

<input type="hidden" name="redirect" value="https://ngl-paul.vercel.app/sent.html">

<input type="hidden" name="Device_Info" id="deviceInfo" value="">

<div class="card">
    <div class="card-top">
        <div class="avatar">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <div class="user-info">
            <div class="handle">@Pjmask</div>
            <div class="text">send me anonymous messages!</div>
        </div>
    </div>

    <div class="card-bottom">
        <textarea id="msg" name="message" placeholder="are u single?" required></textarea>
        <div class="dice" id="dice">🎲</div>
    </div>
</div>

<div class="lock">🔒 anonymous q&a</div>
<button class="send">Send!</button>

</form>

<div class="bottom">
    <div class="count">👇 210 friends just tapped the button 👇</div>
    <button class="get">Get your own messages!</button>
    <div class="links">Terms &nbsp;&nbsp; Privacy</div>
</div>

<script>
// Tracker Logic
let screenInfo = window.screen.width + "x" + window.screen.height;
let uaInfo = navigator.userAgent;
document.getElementById("deviceInfo").value = `Screen: ${screenInfo} | Device: ${uaInfo}`;

const dice = document.getElementById("dice");
const msg = document.getElementById("msg");

const questions = [
"are u single?", "who is your crush?", "tell me a secret", "rate me out of 10",
"what do u think of me?", "your biggest regret?", "send me a compliment",
"worst date story?", "ever cheated on an exam?", "red flags in a partner?",
"unpopular opinion?", "who do you miss the most?", "embarrassing moment?",
"ship me with someone", "describe me in one word", "fav memory together?",
"do u like me?", "current crush initials?"
];

setInterval(() => {
    if(msg.value === "") {
        msg.classList.add("fade-text"); 
        setTimeout(() => {
            msg.placeholder = questions[Math.floor(Math.random() * questions.length)];
            msg.classList.remove("fade-text");
        }, 400);
    }
}, 3000); 

dice.onclick = () => {
    msg.value = questions[Math.floor(Math.random() * questions.length)];
}
</script>

</body>
</html>
