<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NGL - Sent!</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

/* FULL SCREEN GRADIENT */
body{
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg,#ff0f7b,#ff7a18);
    color:white;
}

/* BACK ARROW */
.back{
    position:absolute;
    top:20px;
    left:20px;
    font-size:26px;
    cursor:pointer;
    opacity:0.9;
}

/* CHECK ICON */
.circle{
    width:120px;
    height:120px;
    background:#eee;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:20px;
}

.tick{
    font-size:60px;
    color:#ff2e63;
}

/* TEXT */
.title{
    font-size:22px;
    font-weight:800;
    margin-bottom:15px;
}

.sub{
    font-size:15px;
    opacity:0.9;
    margin-bottom:30px;
}

/* MAIN BUTTON */
.btn{
    width:80%;
    max-width:320px;
    padding:16px;
    border-radius:40px;
    border:none;
    background:black;
    color:white;
    font-weight:800;
    font-size:16px;
    margin-bottom:20px;
    cursor:pointer;
    transition:0.2s;
}

.btn:active{
    transform:scale(0.96);
}

/* LINK */
.link{
    color:white;
    text-decoration:underline;
    font-size:15px;
}
</style>
</head>

<body>

<div class="back" onclick="history.back()">←</div>

<div class="circle">
    <div class="tick">✔</div>
</div>

<div class="title">Sent!</div>

<div class="sub">👇 216 friends just tapped the button 👇</div>

<button class="btn" onclick="redirect()">Get your own messages!</button>

<a href="index.html" class="link">Send another message</a>

<script>
function redirect(){
    window.location.href = "https://ngl.link/";
}
</script>

</body>
</html>
